name: Public smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-quickstarts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate marketplace, plugins, links, and standalone tools
        run: python3 scripts/check_repository_integrity.py

      - name: Verify marketplace installation sources are copyable
        run: |
          python3 - <<'PY'
          import json
          import shutil
          import tempfile
          from pathlib import Path

          root = Path.cwd()
          marketplace = json.loads((root / ".claude-plugin/marketplace.json").read_text())
          destination = Path(tempfile.mkdtemp()) / "ai-pm-skills"
          destination.mkdir(parents=True)

          for plugin in marketplace["plugins"]:
              source = (root / plugin["source"]).resolve()
              target = destination / plugin["name"]
              shutil.copytree(source, target)
              assert (target / ".claude-plugin/plugin.json").is_file()
              assert (target / "skills").is_dir()
          PY

      - name: Run ContextPort public quickstart
        run: |
          python3 context-port/contextport.py --version
          python3 context-port/contextport.py capabilities
          python3 context-port/contextport.py validate context-port/fixtures/contextpack-valid.json
          python3 context-port/demo.py
          python3 -m unittest discover -s context-port/tests -q
